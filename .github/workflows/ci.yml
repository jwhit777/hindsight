name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        py: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
      - name: Install (editable + dev extras)
        run: python -m pip install -e .[dev]
      - name: Smoke (end-to-end spike)
        run: make smoke PYTHON=python
      - name: Tests (11-assertion self-test)
        run: make test PYTHON=python
      - name: Lint (ruff)
        run: make lint PYTHON=python
