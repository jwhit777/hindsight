name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # GitHub forces Node 24 by 2026-09-16; opt in now to suppress the
  # deprecation warning and surface any incompatibility early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        py: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
      - name: Install (editable + dev extras)
        run: python -m pip install -e .[dev]
      - name: Smoke (end-to-end spike)
        run: make smoke PYTHON=python
      - name: Tests (full self-test suite)
        run: make test PYTHON=python
      - name: Lint (ruff)
        run: make lint PYTHON=python
