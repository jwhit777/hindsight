# Hindsight — pre-commit hooks
#
# After cloning and `pip install -e .[dev]`, run `pre-commit install` once
# to wire these into every `git commit`. See CONTRIBUTING.md.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        files: ^src/hindsight/
